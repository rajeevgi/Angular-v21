<p class="bg-secondary text-center text-white mt-3 p-3">ng-datepicker works!</p>

<div class="container mt-4">
    <!-- Normal Input -->
    Selected Date:  {{ selectedDate }}
    <input type="text" class="form-control mb-3" [(ngModel)]="selectedDate"
        placeholder="Select Date">

    <!-- Hijri Gregorian Datepicker -->
    <hijri-gregorian-datepicker 
        #pikcer
        [mode]="selectedCal" 
        [canChangeMode]="true" 
        [futureValidation]="false" 
        [disableDayPicker]="false" 
        [multiple]="false"
        [isRequired]="true" 
        [showConfirmButton]="true" 
        [dir]="'ltr'" 
        [locale]="'en'"
        (onDaySelect)="onDateSelect($event)"
        (onSubmit)="onSubmit($event)">

    </hijri-gregorian-datepicker>
</div>
